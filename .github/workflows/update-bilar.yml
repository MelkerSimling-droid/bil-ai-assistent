name: Uppdatera bilbestånd

on:
  schedule:
    # 05:00 svensk tid (04:00 UTC under sommartid)
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hämta aktuellt bilbestånd från Wayke
        run: python3 scripts/scrape_bilar.py data/bilar.json

      - name: Committa och pusha om något ändrats
        run: |
          if git diff --quiet -- data/bilar.json; then
            echo "Inga förändringar i bilbeståndet."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bilar.json
          git commit -m "Uppdatera bilbestånd från Wayke"
          git push
